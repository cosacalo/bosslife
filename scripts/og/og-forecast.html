<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  @font-face { font-family:'Bricolage';
    src:url('../../node_modules/@fontsource-variable/bricolage-grotesque/files/bricolage-grotesque-latin-wght-normal.woff2') format('woff2');
    font-weight:200 800; font-display:block; }
  @font-face { font-family:'Hanken';
    src:url('../../node_modules/@fontsource-variable/hanken-grotesk/files/hanken-grotesk-latin-wght-normal.woff2') format('woff2');
    font-weight:100 900; font-display:block; }
  :root{ --ink:#002454; --surface:#F2F8FE; --azure:#0C78E4; --azure-ink:#0a63c4; --sun:#FCD80C; --slate:#5B708A; --white:#fff;
    --line:color-mix(in srgb,var(--slate) 18%,transparent);
    --display:'Bricolage',sans-serif; --body:'Hanken',sans-serif; }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1200px;height:630px;overflow:hidden;}
  .og{position:relative;width:1200px;height:630px;overflow:hidden;font-family:var(--body);
    background:radial-gradient(120% 130% at 16% 28%,#0a3a78 0%,#002454 55%,#001633 100%);-webkit-font-smoothing:antialiased;}

  /* ---- montage of forecast UI, angled like a product shot ---- */
  .montage{position:absolute;right:0;top:0;width:680px;height:630px;perspective:1800px;z-index:1;}
  .deck{position:absolute;inset:0;transform:rotateY(-19deg) rotateX(7deg) rotate(-2deg);transform-style:preserve-3d;}
  .montage__feather{position:absolute;left:0;top:0;width:200px;height:100%;z-index:6;
    background:linear-gradient(to right,#002454 0%,rgba(0,36,84,0.55) 45%,rgba(0,36,84,0) 100%);}

  .pcard{position:absolute;background:var(--white);border:1px solid var(--line);border-radius:18px;
    box-shadow:0 26px 60px rgba(0,8,26,0.5);padding:16px 20px 14px;}
  .pcard-title{display:flex;align-items:center;gap:9px;font-family:var(--display);font-weight:700;font-size:16px;color:var(--ink);margin-bottom:8px;}
  .pcard-title svg{flex-shrink:0;}
  .pcard-tag{font-size:13px;color:var(--slate);font-weight:500;float:right;}
  .tide-svg{width:100%;height:170px;display:block;}
  .rain-svg{width:100%;height:120px;display:block;}
  .tide-events{display:grid;grid-template-columns:repeat(4,1fr);margin-top:8px;border-top:1px solid var(--line);}
  .tev{padding:8px 4px 2px;text-align:center;border-right:1px solid var(--line);}
  .tev:last-child{border-right:none;}
  .tev .tk{font-weight:700;font-size:10px;letter-spacing:.06em;text-transform:uppercase;}
  .tev .tk.high{color:var(--azure-ink);} .tev .tk.low{color:var(--slate);}
  .tev .tf{font-family:var(--display);font-weight:800;font-size:20px;line-height:1;margin:3px 0 1px;color:var(--ink);}
  .tev .tt{font-size:11px;color:var(--slate);font-weight:500;}

  /* the tide card sits back, the rain card overlaps in front, both bleed off-frame */
  .card-tide{width:540px;top:74px;left:70px;}
  .card-rain{width:420px;top:386px;left:228px;}

  /* metric tiles cluster */
  .tile{position:absolute;background:var(--white);border:1px solid var(--line);border-radius:16px;
    box-shadow:0 22px 50px rgba(0,8,26,0.5);padding:14px 16px;width:184px;}
  .tile .tl{font-weight:600;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--slate);}
  .tile .tv{font-family:var(--display);font-weight:800;font-size:30px;line-height:1;margin-top:5px;color:var(--ink);}
  .tile .tv .u{font-size:14px;font-weight:700;color:var(--slate);}
  .card-wind{top:38px;left:392px;}

  .badge{position:absolute;top:92px;left:600px;z-index:20;display:inline-flex;align-items:center;gap:9px;
    background:var(--sun);color:var(--ink);font-family:var(--display);font-weight:800;font-size:22px;
    padding:13px 24px;border-radius:999px;white-space:nowrap;box-shadow:0 20px 44px rgba(0,8,26,0.55);}

  /* ---- left type ---- */
  .zone{position:absolute;left:78px;top:0;width:540px;height:630px;display:flex;flex-direction:column;
    justify-content:center;padding-bottom:78px;z-index:8;}
  .eyebrow{font-family:var(--body);font-weight:600;font-size:21px;letter-spacing:.2em;text-transform:uppercase;color:#0C78E4;margin-bottom:22px;}
  .headline{font-family:var(--display);font-weight:800;font-size:82px;line-height:0.95;letter-spacing:-0.022em;color:#fff;}
  .headline .p{color:var(--sun);}
  .sub{font-family:var(--body);font-weight:600;font-size:24px;color:rgba(255,255,255,0.92);margin-top:28px;letter-spacing:0.01em;}
  .logo{position:absolute;left:78px;bottom:44px;width:196px;height:auto;display:block;z-index:9;}
</style>
</head>
<body>
  <div class="og">
    <div class="montage">
      <div class="deck">
        <div class="pcard card-tide">
          <div class="pcard-title" id="tide-title"></div>
          <div id="tide-chart"></div>
          <div class="tide-events" id="tide-events"></div>
        </div>
        <div class="pcard card-rain">
          <div class="pcard-title" id="rain-title"></div>
          <div id="rain-chart"></div>
        </div>
        <div class="tile card-wind">
          <div class="tl">Wind</div>
          <div class="tv">5-10<span class="u"> kt</span></div>
        </div>
      </div>
    </div>
    <div class="montage__feather"></div>
    <div class="badge" id="badge"></div>

    <div class="zone">
      <div class="eyebrow">Sarasota Boating Forecast</div>
      <div class="headline">Wind. Rain.<br/>Tide. Sun.</div>
      <div class="sub">Your live forecast at bossliferentals.com</div>
    </div>
    <img class="logo" src="../../public/logo.png" alt="Boss Life Rentals" />
  </div>

<script>
  var INK="#002454",AZURE="#0C78E4",AZURE_INK="#0a63c4",SLATE="#5B708A",SUN="#FCD80C",WHITE="#FFFFFF",AZURE_LT="#9cc6f2";
  var FONT="'Hanken',sans-serif",DISPLAY="'Bricolage',sans-serif";
  var WIN_START=9.0,WIN_END=17.0;
  var tides=[{type:'l',ft:0.12,time:'12:38 AM',t:0.633},{type:'h',ft:1.20,time:'9:00 AM',t:9.0},{type:'l',ft:1.05,time:'12:45 PM',t:12.75},{type:'h',ft:2.25,time:'6:25 PM',t:18.417}];
  var rainHourly=[3,3,2,2,2,2,3,4,5,7,9,11,14,18,24,30,34,30,22,16,11,7,5,3];

  function tideIcon(){return '<svg width="22" height="20" viewBox="0 0 26 22" fill="none" stroke="'+AZURE_INK+'" stroke-width="1.8" stroke-linecap="round"><path d="M2 15q3.5-7 6.5 0t6.5 0 6.5 0"/><line x1="2" y1="19.5" x2="23" y2="19.5"/></svg>';}
  function rainIcon(){return '<svg width="22" height="20" viewBox="0 0 28 26" fill="none" stroke="'+AZURE_INK+'" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 16a4.5 4.5 0 0 1-.3-9 6 6 0 0 1 11.3 1.2A4 4 0 0 1 20 16"/><line x1="9" y1="19" x2="8" y2="22"/><line x1="14" y1="19.5" x2="13" y2="22.5"/><line x1="19" y1="19" x2="18" y2="22"/></svg>';}
  function checkIcon(){return '<svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="'+INK+'" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5l3.5 3.5L15 5"/></svg>';}

  function buildTideSVG(){
    var W=1000,H=200,padT=22,padB=30,padL=10,padR=10,plotW=W-padL-padR,plotH=H-padT-padB;
    var ex=[{t:-5.6,v:2.21}].concat(tides.map(function(p){return{t:p.t,v:p.ft};})).concat([{t:25.1,v:0.15}]);
    var minV=-0.6,maxV=2.4,x=function(t){return padL+(t/24)*plotW;},y=function(v){return padT+(1-(v-minV)/(maxV-minV))*plotH;};
    function val(t){for(var i=0;i<ex.length-1;i++){if(t>=ex[i].t&&t<=ex[i+1].t){var f=(1-Math.cos(Math.PI*(t-ex[i].t)/(ex[i+1].t-ex[i].t)))/2;return ex[i].v+(ex[i+1].v-ex[i].v)*f;}}return ex[0].v;}
    var pts=[];for(var t=0;t<=24.001;t+=0.2)pts.push([x(t),y(val(t))]);
    var line=pts.map(function(p,i){return(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1);}).join(" ");
    var area=line+" L "+x(24).toFixed(1)+" "+(padT+plotH).toFixed(1)+" L "+padL.toFixed(1)+" "+(padT+plotH).toFixed(1)+" Z";
    var baseY=padT+plotH,wx1=x(WIN_START),wx2=x(WIN_END);
    var markers=tides.map(function(p){var px=x(p.t),py=y(p.ft),high=p.type==="h",col=high?AZURE:SLATE,lblY=high?py-10:py+18;
      return '<circle cx="'+px.toFixed(1)+'" cy="'+py.toFixed(1)+'" r="5" fill="'+WHITE+'" stroke="'+col+'" stroke-width="2.5"/><circle cx="'+px.toFixed(1)+'" cy="'+py.toFixed(1)+'" r="2" fill="'+col+'"/><text x="'+px.toFixed(1)+'" y="'+lblY.toFixed(1)+'" text-anchor="middle" font-family="'+FONT+'" font-size="12" font-weight="700" fill="'+INK+'">'+p.ft.toFixed(2)+'</text>';}).join("");
    return '<svg class="tide-svg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none"><defs><linearGradient id="sf" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="'+AZURE+'" stop-opacity="0.32"/><stop offset="1" stop-color="'+AZURE+'" stop-opacity="0.05"/></linearGradient></defs><rect x="'+wx1.toFixed(1)+'" y="'+padT+'" width="'+(wx2-wx1).toFixed(1)+'" height="'+plotH.toFixed(1)+'" fill="'+SUN+'" opacity="0.22" rx="4"/><path d="'+area+'" fill="url(#sf)"/><path d="'+line+'" fill="none" stroke="'+AZURE+'" stroke-width="3" stroke-linejoin="round"/><line x1="'+padL+'" y1="'+baseY+'" x2="'+(W-padR)+'" y2="'+baseY+'" stroke="'+INK+'" stroke-opacity="0.45" stroke-width="1.2"/>'+markers+'</svg>';
  }
  function buildRainSVG(){
    var W=1000,H=160,padT=14,padB=22,padL=10,padR=10,plotW=W-padL-padR,plotH=H-padT-padB;
    var x=function(t){return padL+(t/24)*plotW;},base=padT+plotH,barW=(plotW/24)*0.62,wx1=x(WIN_START),wx2=x(WIN_END);
    var bars=rainHourly.map(function(p,h){var cx=x(h+0.5),bh=Math.max(2,(p/100)*plotH),inWin=(h+0.5)>=WIN_START&&(h+0.5)<=WIN_END,col=inWin?AZURE:AZURE_LT;
      return '<rect x="'+(cx-barW/2).toFixed(1)+'" y="'+(base-bh).toFixed(1)+'" width="'+barW.toFixed(1)+'" height="'+bh.toFixed(1)+'" rx="3" fill="'+col+'"/>';}).join("");
    return '<svg class="rain-svg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none"><rect x="'+wx1.toFixed(1)+'" y="'+padT+'" width="'+(wx2-wx1).toFixed(1)+'" height="'+plotH.toFixed(1)+'" fill="'+SUN+'" opacity="0.22" rx="4"/>'+bars+'<line x1="'+padL+'" y1="'+base+'" x2="'+(W-padR)+'" y2="'+base+'" stroke="'+INK+'" stroke-opacity="0.45" stroke-width="1.2"/></svg>';
  }
  document.getElementById('tide-title').innerHTML=tideIcon()+'<span>Tide forecast</span>';
  document.getElementById('rain-title').innerHTML=rainIcon()+'<span>Rain by hour</span>';
  document.getElementById('tide-chart').innerHTML=buildTideSVG();
  document.getElementById('rain-chart').innerHTML=buildRainSVG();
  document.getElementById('badge').innerHTML=checkIcon()+' Good to go';
  document.getElementById('tide-events').innerHTML=tides.map(function(p){var high=p.type==='h';
    return '<div class="tev"><div class="tk '+(high?'high':'low')+'">'+(high?'High':'Low')+'</div><div class="tf">'+p.ft.toFixed(2)+'</div><div class="tt">'+p.time+'</div></div>';}).join("");
</script>
</body>
</html>
